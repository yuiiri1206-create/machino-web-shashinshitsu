<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="1200" height="800" fill="#FBFDFB"/>

  <!-- nav -->
  <rect x="0" y="0" width="1200" height="76" fill="#EEF6F0"/>
  <text x="56" y="47" font-size="26" font-weight="700" fill="#3D5A4A" letter-spacing="1">整体サロン ここち</text>
  <text x="800" y="45" font-size="16" fill="#5F7A6C">施術内容</text>
  <text x="900" y="45" font-size="16" fill="#5F7A6C">料金案内</text>
  <text x="1000" y="45" font-size="16" fill="#5F7A6C">アクセス</text>
  <rect x="1090" y="24" width="110" height="30" rx="15" fill="#7CC5E8"/>
  <text x="1145" y="45" font-size="14" fill="#FFFFFF" text-anchor="middle">ご予約</text>

  <!-- hero -->
  <text x="56" y="200" font-size="38" font-weight="700" fill="#33443C">からだの緊張、</text>
  <text x="56" y="252" font-size="38" font-weight="700" fill="#33443C">ほどきませんか。</text>
  <text x="58" y="300" font-size="17" fill="#5F7A6C">一人ひとりの骨格やくせに合わせた、</text>
  <text x="58" y="326" font-size="17" fill="#5F7A6C">オーダーメイドの施術をご提案します。</text>
  <rect x="58" y="366" width="200" height="52" rx="26" fill="#7CC5E8"/>
  <text x="158" y="399" font-size="16" fill="#FFFFFF" text-anchor="middle">ご予約はこちら</text>

  <!-- hero photo panel: leaf / wellness illustration -->
  <rect x="620" y="120" width="524" height="320" rx="12" fill="#E3F0E6"/>
  <g stroke="#5FA085" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M882,180 C 940,220 940,300 882,360 C 824,300 824,220 882,180 Z"/>
    <line x1="882" y1="195" x2="882" y2="345"/>
  </g>
  <circle cx="820" cy="290" r="6" fill="#7CC5E8"/>
  <circle cx="950" cy="250" r="6" fill="#7CC5E8"/>
  <circle cx="960" cy="330" r="6" fill="#7CC5E8"/>

  <!-- feature cards -->
  <g>
    <rect x="56" y="470" width="326" height="230" rx="10" fill="#FFFFFF" stroke="#E1EEE3"/>
    <circle cx="100" cy="514" r="16" fill="none" stroke="#7CC5E8" stroke-width="2"/>
    <path d="M92,520 q8,-14 16,0" stroke="#7CC5E8" stroke-width="2" fill="none"/>
    <text x="80" y="566" font-size="18" font-weight="700" fill="#33443C">骨格矯正</text>
    <text x="80" y="596" font-size="13" fill="#5F7A6C">姿勢のくせを見直し、</text>
    <text x="80" y="616" font-size="13" fill="#5F7A6C">本来のバランスへ。</text>
  </g>
  <g>
    <rect x="437" y="470" width="326" height="230" rx="10" fill="#FFFFFF" stroke="#E1EEE3"/>
    <circle cx="481" cy="514" r="16" fill="none" stroke="#7CC5E8" stroke-width="2"/>
    <path d="M481,502 v24 M469,514 h24" stroke="#7CC5E8" stroke-width="2"/>
    <text x="461" y="566" font-size="18" font-weight="700" fill="#33443C">産後ケア</text>
    <text x="461" y="596" font-size="13" fill="#5F7A6C">出産で変化したからだを、</text>
    <text x="461" y="616" font-size="13" fill="#5F7A6C">ゆっくり整えます。</text>
  </g>
  <g>
    <rect x="818" y="470" width="326" height="230" rx="10" fill="#FFFFFF" stroke="#E1EEE3"/>
    <circle cx="862" cy="514" r="16" fill="none" stroke="#7CC5E8" stroke-width="2"/>
    <path d="M854,510 q8,10 16,0" stroke="#7CC5E8" stroke-width="2" fill="none"/>
    <text x="842" y="566" font-size="18" font-weight="700" fill="#33443C">肩こり・腰痛</text>
    <text x="842" y="596" font-size="13" fill="#5F7A6C">日々の負担が溜まった、</text>
    <text x="842" y="616" font-size="13" fill="#5F7A6C">からだをほぐします。</text>
  </g>

  <rect x="0" y="760" width="1200" height="40" fill="#EEF6F0"/>
  <text x="600" y="785" font-size="13" fill="#7C9186" text-anchor="middle">© 整体サロン ここち（デザインサンプル）</text>
</svg>
