<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif">
  <rect width="1200" height="800" fill="#FBF6EF"/>

  <!-- nav -->
  <rect x="0" y="0" width="1200" height="76" fill="#F3EAD9"/>
  <text x="56" y="47" font-size="26" font-weight="700" fill="#4A3F33" letter-spacing="1">田中工務店</text>
  <text x="770" y="45" font-size="16" fill="#6B6055">施工事例</text>
  <text x="880" y="45" font-size="16" fill="#6B6055">会社概要</text>
  <text x="990" y="45" font-size="16" fill="#6B6055">アクセス</text>
  <rect x="1080" y="24" width="120" height="30" rx="15" fill="#B08A6A"/>
  <text x="1140" y="45" font-size="14" fill="#FFFFFF" text-anchor="middle">お問い合わせ</text>

  <!-- hero -->
  <text x="56" y="200" font-size="40" font-weight="700" fill="#3A332C">地域に根ざした、</text>
  <text x="56" y="252" font-size="40" font-weight="700" fill="#3A332C">家づくりを。</text>
  <text x="58" y="300" font-size="17" fill="#6B6055">耐震・断熱・デザイン。暮らしに寄り添う住まいを、</text>
  <text x="58" y="326" font-size="17" fill="#6B6055">地元の職人がていねいにご提案します。</text>
  <rect x="58" y="366" width="190" height="52" rx="26" fill="#B08A6A"/>
  <text x="153" y="399" font-size="16" fill="#FFFFFF" text-anchor="middle">無料相談はこちら</text>

  <!-- hero photo panel: house illustration -->
  <rect x="620" y="120" width="524" height="320" rx="12" fill="#E7DCC7"/>
  <g stroke="#8C6F52" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <polyline points="770,300 770,220 882,150 994,220 994,300"/>
    <polyline points="750,232 882,150 1014,232"/>
    <rect x="820" y="255" width="50" height="45" fill="none"/>
    <rect x="900" y="255" width="35" height="35" fill="none"/>
  </g>
  <line x1="700" y1="300" x2="1064" y2="300" stroke="#8C6F52" stroke-width="4"/>

  <!-- feature cards -->
  <g>
    <rect x="56" y="470" width="326" height="230" rx="10" fill="#FFFFFF" stroke="#EADFCB"/>
    <circle cx="100" cy="514" r="16" fill="none" stroke="#B08A6A" stroke-width="2"/>
    <path d="M92,514 h16 M100,506 v16" stroke="#B08A6A" stroke-width="2"/>
    <text x="80" y="566" font-size="18" font-weight="700" fill="#3A332C">自由設計</text>
    <text x="80" y="596" font-size="13" fill="#6B6055">間取りも素材も、</text>
    <text x="80" y="616" font-size="13" fill="#6B6055">暮らし方に合わせて。</text>
  </g>
  <g>
    <rect x="437" y="470" width="326" height="230" rx="10" fill="#FFFFFF" stroke="#EADFCB"/>
    <circle cx="481" cy="514" r="16" fill="none" stroke="#B08A6A" stroke-width="2"/>
    <path d="M481,502 v24 M470,514 l11,11 l11,-11" stroke="#B08A6A" stroke-width="2" fill="none"/>
    <text x="461" y="566" font-size="18" font-weight="700" fill="#3A332C">耐震・断熱</text>
    <text x="461" y="596" font-size="13" fill="#6B6055">最新基準に対応した、</text>
    <text x="461" y="616" font-size="13" fill="#6B6055">安心の住まいづくり。</text>
  </g>
  <g>
    <rect x="818" y="470" width="326" height="230" rx="10" fill="#FFFFFF" stroke="#EADFCB"/>
    <circle cx="862" cy="514" r="16" fill="none" stroke="#B08A6A" stroke-width="2"/>
    <path d="M854,514 l6,6 l12,-14" stroke="#B08A6A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="842" y="566" font-size="18" font-weight="700" fill="#3A332C">施工実績200件</text>
    <text x="842" y="596" font-size="13" fill="#6B6055">創業25年、地域とともに</text>
    <text x="842" y="616" font-size="13" fill="#6B6055">歩んできた実績。</text>
  </g>

  <rect x="0" y="760" width="1200" height="40" fill="#F3EAD9"/>
  <text x="600" y="785" font-size="13" fill="#8C8172" text-anchor="middle">© 田中工務店（デザインサンプル）</text>
</svg>
